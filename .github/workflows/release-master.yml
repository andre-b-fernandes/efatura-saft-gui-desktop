name: Release on master

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install WiX (for jpackage --type exe)
        shell: pwsh
        run: |
          dotnet tool install --global wix
          echo "$env:USERPROFILE/.dotnet/tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        working-directory: gui-wrapper
        run: |
          .\package-exe.bat

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $ts = Get-Date -Format "yyyyMMdd-HHmmss"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "master-build-$ts-$shortSha"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=Master build $ts ($shortSha)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "gui-wrapper/release" -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe installer found in gui-wrapper/release"
          }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.installer.outputs.path }}
